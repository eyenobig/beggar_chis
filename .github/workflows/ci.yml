name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CFB_GITHUB_REPO: eyenobig/chis-burner-cmd
  CFB_RELEASE_TAG: ${{ vars.CFB_RELEASE_TAG || 'latest' }}

jobs:
  build-check:
    runs-on: windows-latest
    steps:
      - name: Checkout application
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Download released cfb sidecar
        run: npm run build:cfb:github
        env:
          CFB_TARGET: x86_64-pc-windows-msvc
          CFB_GITHUB_TOKEN: ${{ secrets.CFB_RELEASE_TOKEN || github.token }}

      - name: Compile check
        run: npm run tauri build -- --no-bundle
