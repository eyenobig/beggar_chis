name: Release

# 触发方式：
#   1. 推送以 v 开头的 tag（如 v0.1.0）时自动构建并发布 Release
#   2. 在 Actions 页面手动点击运行（workflow_dispatch）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write # 允许创建 Release 并上传安装包
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon (M 系列)
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
            cfb_bin: cfb
            cfb_sidecar: cfb-aarch64-apple-darwin
          - platform: 'macos-latest' # Intel Mac
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
            cfb_bin: cfb
            cfb_sidecar: cfb-x86_64-apple-darwin
          - platform: 'ubuntu-22.04' # Linux
            args: ''
            rust_target: x86_64-unknown-linux-gnu
            cfb_bin: cfb
            cfb_sidecar: cfb-x86_64-unknown-linux-gnu
          - platform: 'windows-latest' # Windows
            args: ''
            rust_target: x86_64-pc-windows-msvc
            cfb_bin: cfb.exe
            cfb_sidecar: cfb-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout 代码（含 chis-burner-cmd 子模块）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Linux 系统依赖 (仅 ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev pkg-config

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 需要同时安装两个 target 以支持 Intel + Apple Silicon
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust 依赖缓存（加速后续构建）
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./chis-burner-cmd -> target
          key: ${{ matrix.rust_target }}

      - name: 从子模块构建 cfb sidecar
        run: |
          cargo build --release --locked --manifest-path chis-burner-cmd/Cargo.toml --target ${{ matrix.rust_target }}
          mkdir -p src-tauri/binaries
          cp "chis-burner-cmd/target/${{ matrix.rust_target }}/release/${{ matrix.cfb_bin }}" \
            "src-tauri/binaries/${{ matrix.cfb_sidecar }}"

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并发布 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'tauri-app ${{ github.ref_name }}'
          releaseBody: '下载下方对应平台的安装包即可安装使用。'
          releaseDraft: true   # 先创建为草稿，确认无误后手动发布
          prerelease: false
          args: ${{ matrix.args }}
