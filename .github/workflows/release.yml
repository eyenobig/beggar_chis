name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      cfb_tag:
        description: chis-burner-cmd release tag (for example v0.1.0)
        required: false
        default: latest

env:
  CFB_GITHUB_REPO: eyenobig/chis-burner-cmd
  CFB_RELEASE_TAG: ${{ inputs.cfb_tag || vars.CFB_RELEASE_TAG || 'latest' }}
  VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}

jobs:
  # 门禁：tag 触发时，校验 tag 指向的提交在固定分支 main 上，否则拦下整条流水线
  # （省掉 4 平台的无效构建）。workflow_dispatch 手动触发没有 tag，直接放行。
  # 与 chis-burner-cmd 的 build.yml 门禁保持一致。
  gate:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_BRANCH: main   # 固定发版分支，想改成别的在这里改
    steps:
      - uses: actions/checkout@v4
      - name: Require tag on ${{ env.RELEASE_BRANCH }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$RELEASE_BRANCH"
          if git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "OK: tag '$GITHUB_REF_NAME' (commit $GITHUB_SHA) is on '$RELEASE_BRANCH'."
          else
            echo "::error::Tag '$GITHUB_REF_NAME' 不在 '$RELEASE_BRANCH' 分支上，已拒绝构建。请把 main 快进到该提交，或在 main 上重新打 tag。"
            exit 1
          fi

  publish-tauri:
    # gate 在 tag 推送时校验分支；workflow_dispatch 手动触发时 gate 被 skip，
    # 这里用 success() || skipped() 让手动触发也能跑到 publish。
    needs: gate
    if: ${{ success() || needs.gate.result == 'skipped' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout application
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev pkg-config

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify production API configuration
        run: node -e "if (!process.env.VITE_API_BASE_URL) throw new Error('Missing API_BASE_URL repository secret')"

      - name: Download released cfb sidecar
        run: npm run build:cfb:github
        env:
          CFB_TARGET: ${{ matrix.rust_target }}
          CFB_GITHUB_TOKEN: ${{ secrets.CFB_RELEASE_TOKEN || github.token }}

      - name: Build and publish Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: tauri-app ${{ github.ref_name }}
          releaseBody: Download the installer for your platform below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
